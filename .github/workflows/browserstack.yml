name: BrowserStack Espresso Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build App and Test APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Upload APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

      - name: Upload App APK to BrowserStack
        id: upload_app
        run: |
          RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
          -X POST "https://api-cloud.browserstack.com/app-automate/espresso/v2/app" \
          -F "file=@app/build/outputs/apk/debug/app-debug.apk")
          APP_URL=$(echo $RESPONSE | jq -r '.app_url')
          echo "APP_URL=$APP_URL" >> $GITHUB_OUTPUT

      - name: Upload Test APK to BrowserStack
        id: upload_test
        run: |
          RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
          -X POST "https://api-cloud.browserstack.com/app-automate/espresso/v2/test-suite" \
          -F "file=@app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk")
          echo "Full Test Upload Response: $RESPONSE"
          TEST_URL=$(echo $RESPONSE | jq -r '.test_url')
          echo "Extracted TEST_URL: $TEST_URL"
          echo "TEST_URL=$TEST_URL" >> $GITHUB_OUTPUT

      - name: Execute Espresso Tests on BrowserStack
        run: |
          echo "Using APP_URL: ${{ steps.upload_app.outputs.APP_URL }}"
          echo "Using TEST_URL: ${{ steps.upload_test.outputs.TEST_URL }}"
          RESPONSE=$(curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
          -X POST "https://api-cloud.browserstack.com/app-automate/espresso/v2/build" \
          -d "{\"app\": \"${{ steps.upload_app.outputs.APP_URL }}\", \"testSuite\": \"${{ steps.upload_test.outputs.TEST_URL }}\", \"devices\": [\"Samsung Galaxy S23-13.0\"]}" \
          -H "Content-Type: application/json")
          
          echo "BrowserStack Response:"
          echo $RESPONSE | jq .
          
          BUILD_ID=$(echo $RESPONSE | jq -r '.build_id')
          echo "Acompanhe o teste aqui: https://app-automate.browserstack.com/dashboard/v2/builds/$BUILD_ID"
